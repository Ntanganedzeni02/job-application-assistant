<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #13151c;
      --surface2: #1c1f2b;
      --border: #252836;
      --accent: #089763;
      --accent2: #7c6dff;
      --warn: #ff6b6b;
      --text: #e8eaf0;
      --muted: #6b7194;
      --radius: 12px;
      --api: http://localhost:8000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(92,255,177,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92,255,177,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      background: rgba(92,255,177,0.08);
      border: 1px solid rgba(92,255,177,0.2);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      margin-top: 0.75rem;
      font-size: 1.05rem;
      font-weight: 400;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem;
      margin: 2rem 0;
    }

    .tab {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: none;
      background: none;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      text-align: center;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid rgba(92,255,177,0.15);
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* Form elements */
    textarea, input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input:focus {
      border-color: rgba(92,255,177,0.35);
    }

    textarea { min-height: 160px; }

    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-family: 'DM Mono', monospace;
    }

    .field { margin-bottom: 1rem; }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #050807;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1.75rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      margin-top: 0.25rem;
    }

    .btn:hover { background: #79ffc4; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(5,8,7,0.3);
      border-top-color: #050807;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result area */
    .result {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1.25rem;
      display: none;
    }
    .result.show { display: block; }

    .result-title {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* Score pill */
    .score-big {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .score-big.high { color: var(--accent); }
    .score-big.mid { color: #ffd166; }
    .score-big.low { color: var(--warn); }

    .qualify-badge {
      display: inline-block;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: 0.4rem;
    }
    .qualify-yes { background: rgba(92,255,177,0.12); color: var(--accent); border: 1px solid rgba(92,255,177,0.25); }
    .qualify-no { background: rgba(255,107,107,0.12); color: var(--warn); border: 1px solid rgba(255,107,107,0.25); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }

    .mini-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .mini-title {
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }
    .chip-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      background: rgba(124,109,255,0.1);
      border: 1px solid rgba(124,109,255,0.2);
      color: #a89dff;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
    }
    .chip.missing {
      background: rgba(255,107,107,0.08);
      border-color: rgba(255,107,107,0.2);
      color: #ff9f9f;
    }

    /* Text output */
    .text-output {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .text-output::-webkit-scrollbar { width: 4px; }
    .text-output::-webkit-scrollbar-track { background: transparent; }
    .text-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .changes-list { list-style: none; }
    .changes-list li {
      font-size: 0.83rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .changes-list li::before { content: '→'; color: var(--accent); flex-shrink: 0; }

    .error-box {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      color: #ff9f9f;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      margin-top: 1rem;
      display: none;
    }
    .error-box.show { display: block; }

    /* API config */
    .api-config {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.2rem;
      margin-bottom: 1.5rem;
    }
    .api-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warn);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .api-dot.ok { background: var(--accent); }
    .api-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      flex: 1;
    }
    .api-url-input {
      min-height: unset;
      width: auto;
      max-width: 260px;
      padding: 0.4rem 0.75rem;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">AI-Powered</div>
      <h1>Job Application<br />Assistant</h1>
      <p class="subtitle">Analyze your CV, match jobs, and generate cover letters — instantly.</p>
    </header>

    <!-- API config bar -->
    <div class="api-config">
      <div class="api-dot" id="apiDot"></div>
      <span class="api-label">Backend URL</span>
      <input type="text" class="api-url-input" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000" />
      <button class="btn" style="width:auto;padding:0.4rem 1rem;font-size:0.8rem;" onclick="pingHealth()">Ping</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('analyze')">Analyze CV</button>
      <button class="tab" onclick="switchTab('match')">Match Job</button>
      <button class="tab" onclick="switchTab('improve')">Improve + Cover Letter</button>
    </div>

    <!--  Panel 1: Analyze CV  -->
    <div id="panel-analyze" class="panel active">
      <div class="card">
        <div class="card-title">Your CV</div>
        <div class="field">
          <textarea id="cv-analyze" placeholder="Paste your full CV text here..."></textarea>
        </div>
        <button class="btn" id="btn-analyze" onclick="analyzeCV()">
          <span id="btn-analyze-text">Analyze CV</span>
        </button>
      </div>
      <div class="error-box" id="err-analyze"></div>
      <div class="result" id="result-analyze">
        <div class="result-title">CV Analysis</div>
        <div id="analyze-out"></div>
      </div>
    </div>

    <!--  Panel 2: Match Job -->
    <div id="panel-match" class="panel">
      <div class="card">
        <div class="card-title">Match Your CV to a Job</div>
        <div class="field">
          <label>Your CV</label>
          <textarea id="cv-match" placeholder="Paste your CV..."></textarea>
        </div>
        <div class="field">
          <label>Job Description</label>
          <textarea id="jd-match" placeholder="Paste the job posting..."></textarea>
        </div>
        <button class="btn" id="btn-match" onclick="matchJob()">
          <span id="btn-match-text">Check Match</span>
        </button>
      </div>
      <div class="error-box" id="err-match"></div>
      <div class="result" id="result-match">
        <div class="result-title">Match Result</div>
        <div id="match-out"></div>
      </div>
    </div>

    <!-- Panel 3: Improve -->
    <div id="panel-improve" class="panel">
      <div class="card">
        <div class="card-title">Improve CV & Generate Cover Letter</div>
        <div class="field">
          <label>Your CV</label>
          <textarea id="cv-improve" placeholder="Paste your CV..."></textarea>
        </div>
        <div class="field">
          <label>Job Description</label>
          <textarea id="jd-improve" placeholder="Paste the job posting..."></textarea>
        </div>
        <div class="field">
          <label>Cover Letter Tone</label>
          <select id="tone-improve">
            <option value="professional">Professional</option>
            <option value="enthusiastic">Enthusiastic</option>
            <option value="concise">Concise</option>
          </select>
        </div>
        <button class="btn" id="btn-improve" onclick="improveCV()">
          <span id="btn-improve-text">Improve CV + Generate Cover Letter</span>
        </button>
      </div>
      <div class="error-box" id="err-improve"></div>
      <div class="result" id="result-improve">
        <div class="result-title">Improved CV & Cover Letter</div>
        <div id="improve-out"></div>
      </div>
    </div>
  </div>

  <script>
    // Helpers

    const api = () => document.getElementById('apiUrl').value.replace(/\/$/, '');

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`panel-${name}`).classList.add('active');
    }

    function setLoading(id, loading) {
      const btn = document.getElementById(`btn-${id}`);
      const txt = document.getElementById(`btn-${id}-text`);
      btn.disabled = loading;
      txt.innerHTML = loading
        ? '<div class="spinner"></div> Processing...'
        : { analyze: 'Analyze CV', match: 'Check Match', improve: 'Improve CV + Generate Cover Letter' }[id];
    }

    function showError(id, msg) {
      const el = document.getElementById(`err-${id}`);
      el.textContent = `Error: ${msg}`;
      el.classList.add('show');
    }
    function hideError(id) {
      document.getElementById(`err-${id}`).classList.remove('show');
    }

    async function callAPI(path, body) {
      const res = await fetch(`${api()}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    // Health ping 

    async function pingHealth() {
      const dot = document.getElementById('apiDot');
      try {
        const res = await fetch(`${api()}/health`);
        dot.classList.toggle('ok', res.ok);
      } catch {
        dot.classList.remove('ok');
      }
    }

    pingHealth();

    // Analyze CV

    async function analyzeCV() {
      const cv = document.getElementById('cv-analyze').value.trim();
      if (!cv) return alert('Please paste your CV first.');
      hideError('analyze');
      setLoading('analyze', true);
      try {
        const d = await callAPI('/analyze/cv', { cv_text: cv });
        const el = document.getElementById('analyze-out');
        el.innerHTML = `
          <div style="margin-bottom:1rem">
            <div style="font-size:1.6rem;font-weight:800;letter-spacing:-0.03em">${d.seniority_level}</div>
            <div style="color:var(--muted);font-size:0.85rem;margin-top:0.2rem">${d.experience_years} experience</div>
          </div>
          <p style="font-size:0.9rem;line-height:1.65;color:#c8cad8;margin-bottom:1.25rem">${d.summary}</p>
          <div class="grid2">
            <div class="mini-card">
              <div class="mini-title">Strengths</div>
              ${d.strengths.map(s => `<div style="font-size:0.83rem;padding:0.2rem 0;color:var(--accent)">✓ ${s}</div>`).join('')}
            </div>
            <div class="mini-card">
              <div class="mini-title">Weaknesses</div>
              ${d.weaknesses.map(w => `<div style="font-size:0.83rem;padding:0.2rem 0;color:#ffd166">⚠ ${w}</div>`).join('')}
            </div>
          </div>
          <div class="mini-card" style="margin-top:1rem">
            <div class="mini-title">Skills Identified</div>
            <div class="chip-list" style="margin-top:0.5rem">
              ${d.skills.map(s => `<span class="chip">${s}</span>`).join('')}
            </div>
          </div>
        `;
        document.getElementById('result-analyze').classList.add('show');
      } catch (e) {
        showError('analyze', e.message);
      } finally {
        setLoading('analyze', false);
      }
    }

    // Match Job

    async function matchJob() {
      const cv = document.getElementById('cv-match').value.trim();
      const jd = document.getElementById('jd-match').value.trim();
      if (!cv || !jd) return alert('Please fill in both fields.');
      hideError('match');
      setLoading('match', true);
      try {
        const d = await callAPI('/analyze/match', { cv_text: cv, job_description: jd });
        const scoreClass = d.match_score >= 70 ? 'high' : d.match_score >= 45 ? 'mid' : 'low';
        document.getElementById('match-out').innerHTML = `
          <div style="display:flex;align-items:flex-end;gap:1rem;margin-bottom:1.25rem">
            <div class="score-big ${scoreClass}">${d.match_score}<span style="font-size:1.5rem">%</span></div>
            <div>
              <div class="${d.qualifies ? 'qualify-badge qualify-yes' : 'qualify-badge qualify-no'}">
                ${d.qualifies ? '✓ You Qualify' : '✗ Underqualified'}
              </div>
              <div style="font-size:0.83rem;color:var(--muted);margin-top:0.4rem">${d.recommendation}</div>
            </div>
          </div>
          <p style="font-size:0.87rem;line-height:1.6;color:#c8cad8;margin-bottom:1.25rem">${d.reasoning}</p>
          <div class="grid2">
            <div class="mini-card">
              <div class="mini-title">Matching Skills</div>
              <div class="chip-list" style="margin-top:0.5rem">
                ${d.matching_skills.map(s => `<span class="chip">${s}</span>`).join('') || '<span style="color:var(--muted);font-size:0.8rem">None found</span>'}
              </div>
            </div>
            <div class="mini-card">
              <div class="mini-title">Missing Skills</div>
              <div class="chip-list" style="margin-top:0.5rem">
                ${d.missing_skills.map(s => `<span class="chip missing">${s}</span>`).join('') || '<span style="color:var(--accent);font-size:0.8rem">None — great fit!</span>'}
              </div>
            </div>
          </div>
        `;
        document.getElementById('result-match').classList.add('show');
      } catch (e) {
        showError('match', e.message);
      } finally {
        setLoading('match', false);
      }
    }

    //Improve CV

    async function improveCV() {
      const cv = document.getElementById('cv-improve').value.trim();
      const jd = document.getElementById('jd-improve').value.trim();
      const tone = document.getElementById('tone-improve').value;
      if (!cv || !jd) return alert('Please fill in both fields.');
      hideError('improve');
      setLoading('improve', true);
      try {
        const d = await callAPI('/analyze/improve', { cv_text: cv, job_description: jd, tone });
        document.getElementById('improve-out').innerHTML = `
          <div class="mini-card" style="margin-bottom:1rem">
            <div class="mini-title">Changes Made</div>
            <ul class="changes-list" style="margin-top:0.5rem">
              ${d.changes_made.map(c => `<li>${c}</li>`).join('')}
            </ul>
          </div>
          <div class="mini-card" style="margin-bottom:1rem">
            <div class="mini-title">Improved CV</div>
            <div class="text-output" style="margin-top:0.75rem">${d.improved_cv}</div>
          </div>
          <div class="mini-card">
            <div class="mini-title">Cover Letter</div>
            <div class="text-output" style="margin-top:0.75rem">${d.cover_letter}</div>
          </div>
        `;
        document.getElementById('result-improve').classList.add('show');
      } catch (e) {
        showError('improve', e.message);
      } finally {
        setLoading('improve', false);
      }
    }
  </script>
</body>
</html>
